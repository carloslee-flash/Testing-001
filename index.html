<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Liga San Jerónimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-league { background: linear-gradient(135deg, #1e3a8a 0%, #111827 100%); }
        .accent { color: #fbbf24; }
        .tab-active { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <header class="bg-league text-white py-6 shadow-xl text-center">
        <h1 class="text-3xl font-black uppercase italic">Liga San Jerónimo</h1>
        <p class="accent font-bold mt-1 uppercase text-sm italic">Estadísticas Oficiales 2026</p>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <div class="mb-10 bg-white rounded-xl shadow-md border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-center text-sm">
                    <thead class="bg-gray-100 text-gray-600 uppercase text-[11px]">
                        <tr><th class="p-3">Eq</th><th>JJ</th><th>JG</th><th>JP</th><th>JE</th><th>PTS</th><th class="italic">AVG</th></tr>
                    </thead>
                    <tbody id="tabla-standing" class="divide-y font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="flex border-b mb-6 bg-white rounded-t-lg shadow-sm">
            <button onclick="cambiarVista('bateo')" id="btn-bateo" class="flex-1 py-4 font-black tab-active">BATEADORES</button>
            <button onclick="cambiarVista('pitcheo')" id="btn-pitcheo" class="flex-1 py-4 font-black text-gray-400">LANZADORES</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12" id="lideratos"></div>

        <div class="bg-white rounded-xl shadow-2xl border overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex flex-wrap justify-between items-center gap-4">
                <input type="text" id="buscador" onkeyup="actualizar()" placeholder="Buscar por nombre..." class="p-2 border rounded text-sm w-full md:w-64">
                <select id="filtroEq" onchange="actualizar()" class="p-2 border rounded font-bold text-sm">
                    <option value="TODOS">Todos los Equipos</option>
                    <option value="A">Equipo A</option><option value="B">Equipo B</option><option value="C">Equipo C</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px] md:text-xs">
                    <thead id="head-tabla" class="bg-slate-800 text-white uppercase font-bold"></thead>
                    <tbody id="body-tabla" class="divide-y text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let db = {};
        let vista = 'bateo';

        // FUNCIÓN CLAVE: Corrige los números como 500.000 o 846.154
        function f(n) {
            if (n === undefined || n === null) return 0;
            let num = parseFloat(n);
            // Si el número es mayor a 2000 (como 500000), lo dividimos para que sea un AVG normal (500)
            if (num > 2000) {
                while (num > 1000) { num = num / 10; }
            }
            return Math.round(num);
        }

        async function iniciar() {
            try {
                const r = await fetch('datos_liga.json');
                db = await r.json();
                actualizar();
            } catch (e) { document.body.innerHTML += "<p class='text-red-500 text-center'>Error cargando datos_liga.json. Revisa el nombre del archivo.</p>"; }
        }

        function cambiarVista(v) {
            vista = v;
            document.getElementById('btn-bateo').className = v === 'bateo' ? 'flex-1 py-4 font-black tab-active' : 'flex-1 py-4 font-black text-gray-400';
            document.getElementById('btn-pitcheo').className = v === 'pitcheo' ? 'flex-1 py-4 font-black tab-active' : 'flex-1 py-4 font-black text-gray-400';
            actualizar();
        }

        function actualizar() {
            const eq = document.getElementById('filtroEq').value;
            const busq = document.getElementById('buscador').value.toLowerCase();
            
            // Standing
            document.getElementById('tabla-standing').innerHTML = db.standing.map(s => `
                <tr class="hover:bg-slate-50 border-b">
                    <td class="p-3 text-blue-800 font-black italic text-base">${s.equipo}</td>
                    <td>${f(s.jj)}</td><td>${f(s.jg)}</td><td>${f(s.jp)}</td><td>${f(s.je)}</td>
                    <td class="text-base font-black text-blue-900">${f(s.pts)}</td><td>${f(s.avg)}</td>
                </tr>`).join('');

            if(vista === 'bateo') {
                let list = db.jugadores.filter(j => (eq === 'TODOS' || j.equipo === eq) && j.nombre.toLowerCase().includes(busq));
                renderBateo(list);
                renderLideresBateo();
            } else {
                let list = db.pitchers.filter(p => (eq === 'TODOS' || p.equipo === eq) && p.nombre.toLowerCase().includes(busq));
                renderPitcheo(list);
                renderLideresPitcheo();
            }
        }

        function renderLideresBateo() {
            const cats = [{n:'AVG', k:'avg'}, {n:'HR', k:'hr'}, {n:'HITS', k:'hits'}, {n:'RBI', k:'rbi'}, {n:'RUNS', k:'runs'}, {n:'BB', k:'bb'}];
            renderCards(cats, db.jugadores);
        }

        function renderLideresPitcheo() {
            const cats = [{n:'ERA', k:'era', rev:true}, {n:'WINS', k:'g'}, {n:'K', k:'k'}];
            renderCards(cats, db.pitchers);
        }

        function renderCards(cats, pool) {
            document.getElementById('lideratos').innerHTML = cats.map(cat => {
                const tops = [...pool].sort((a,b) => cat.rev ? f(a[cat.k]) - f(b[cat.k]) : f(b[cat.k]) - f(a[cat.k])).slice(0, 5);
                return `
                <div class="bg-white p-4 rounded-xl shadow border-t-4 border-blue-900">
                    <h4 class="text-xs font-black text-blue-900 uppercase mb-3">${cat.n} TOP 5</h4>
                    ${tops.map((j,i) => `
                        <div class="flex justify-between py-1 border-b text-[11px]">
                            <span>${i+1}. ${j.nombre}</span><span class="font-bold text-blue-600">${f(j[cat.k])}</span>
                        </div>`).join('')}
                </div>`;
            }).join('');
        }

        function renderBateo(l) {
            document.getElementById('head-tabla').innerHTML = `
                <tr><th class="p-3">Jugador</th><th>Eq</th><th>VB</th><th class="bg-blue-700">AVG</th><th class="bg-red-700 text-center">HR</th><th>H</th><th>2B</th><th>3B</th><th>RBI</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(j => `
                <tr class="hover:bg-blue-50 border-b font-medium">
                    <td class="p-3 font-bold">${j.nombre}</td><td class="text-center">${j.equipo}</td><td>${f(j.vb)}</td>
                    <td class="font-black text-blue-700">${f(j.avg)}</td><td class="font-black text-center text-red-600">${f(j.hr)}</td>
                    <td>${f(j.hits)}</td><td>${f(j.b2)}</td><td>${f(j.b3)}</td><td>${f(j.rbi)}</td>
                </tr>`).join('');
        }

        function renderPitcheo(l) {
            document.getElementById('head-tabla').innerHTML = `
                <tr><th class="p-3">Lanzador</th><th>Eq</th><th class="bg-blue-700">ERA</th><th>G</th><th>IP</th><th class="bg-red-700 text-center">K</th><th>WHIP</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(p => `
                <tr class="hover:bg-red-50 border-b font-medium">
                    <td class="p-3 font-bold">${p.nombre}</td><td class="text-center">${p.equipo}</td>
                    <td class="font-black text-blue-700">${f(p.era)}</td><td>${f(p.g)}</td><td>${f(p.ip)}</td>
                    <td class="font-black text-red-600 text-center">${f(p.k)}</td><td>${f(p.whip)}</td>
                </tr>`).join('');
        }

        iniciar();
    </script>
</body>
</html>
