<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Liga San Jerónimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .bg-league { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        .accent { color: #fbbf24; }
        .tab-active { border-bottom: 4px solid #fbbf24; color: #fbbf24; font-weight: 900; }
        .card-leader { transition: all 0.3s ease; display: flex; flex-direction: column; }
        .card-leader:hover { transform: translateY(-5px); }
        .table-container { overflow-x: auto; border-radius: 12px; }
    </style>
</head>
<body>

    <header class="bg-league text-white py-12 shadow-2xl text-center">
        <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter">Liga San Jerónimo</h1>
        <p class="accent font-bold uppercase text-sm mt-2 tracking-widest">Estadísticas Oficiales 2026</p>
    </header>

    <main class="container mx-auto px-4 -mt-10 pb-12">
        
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-10 border-none">
            <div class="bg-slate-900 text-white p-3 text-center text-[10px] font-black uppercase tracking-widest">Tabla de Posiciones</div>
            <div class="table-container">
                <table class="w-full text-center text-sm font-bold">
                    <thead class="bg-slate-50 text-slate-400 uppercase text-[10px]">
                        <tr><th class="p-4 text-left">Equipo</th><th>JJ</th><th>JG</th><th>JP</th><th>JE</th><th class="text-blue-600">PTS</th><th>AVG</th></tr>
                    </thead>
                    <tbody id="tabla-standing" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div class="flex bg-white rounded-xl shadow-lg p-1 mb-8 max-w-md mx-auto">
            <button onclick="cambiarVista('bateo')" id="btn-bateo" class="flex-1 py-3 rounded-lg text-sm transition-all tab-active uppercase">Bateo</button>
            <button onclick="cambiarVista('pitcheo')" id="btn-pitcheo" class="flex-1 py-3 rounded-lg text-sm text-slate-400 font-bold uppercase">Pitcheo</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12" id="lideratos"></div>

        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 bg-slate-50 border-b flex flex-wrap justify-between items-center gap-4">
                <input type="text" id="buscador" onkeyup="actualizar()" placeholder="Buscar jugador..." class="border rounded-lg px-4 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 w-full md:w-64">
                <select id="filtroEq" onchange="actualizar()" class="border rounded-lg px-4 py-2 text-xs font-black text-blue-900 cursor-pointer">
                    <option value="TODOS">TODOS LOS EQUIPOS</option>
                    <option value="A">EQUIPO A</option><option value="B">EQUIPO B</option><option value="C">EQUIPO C</option>
                </select>
            </div>
            <div class="table-container">
                <table class="w-full text-left text-[11px]">
                    <thead id="head-tabla" class="bg-slate-900 text-slate-300 uppercase font-black tracking-widest"></thead>
                    <tbody id="body-tabla" class="divide-y divide-slate-100 font-medium"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const URLS = {
            standing: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy5EGIBeE8HkatJhMNRmGIMD55niqmhwH4O-0JTf10WjSkclcNSThUHD6KbDsSyvg41mY1B7eMinBG/pub?gid=884290641&single=true&output=csv',
            bateoA: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy5EGIBeE8HkatJhMNRmGIMD55niqmhwH4O-0JTf10WjSkclcNSThUHD6KbDsSyvg41mY1B7eMinBG/pub?gid=1561811561&single=true&output=csv',
            bateoB: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy5EGIBeE8HkatJhMNRmGIMD55niqmhwH4O-0JTf10WjSkclcNSThUHD6KbDsSyvg41mY1B7eMinBG/pub?gid=574063817&single=true&output=csv',
            bateoC: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy5EGIBeE8HkatJhMNRmGIMD55niqmhwH4O-0JTf10WjSkclcNSThUHD6KbDsSyvg41mY1B7eMinBG/pub?gid=948591663&single=true&output=csv',
            picheo: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy5EGIBeE8HkatJhMNRmGIMD55niqmhwH4O-0JTf10WjSkclcNSThUHD6KbDsSyvg41mY1B7eMinBG/pub?gid=1522769208&single=true&output=csv'
        };

        let db = { standing: [], jugadores: [], pitchers: [] };
        let vista = 'bateo';

        function f(n, d = false, e = false) {
            if (!n || n === "" || n === "0") return 0;
            let num = parseFloat(n.toString().replace(',', '.').replace('%', '').trim());
            if (isNaN(num)) return 0;
            if (e) return num > 100 ? (num/1000).toFixed(2) : num.toFixed(2);
            if (d && num > 0 && num < 2) return Math.round(num * 1000);
            return Math.round(num);
        }

        function getFotoURL(nombre) {
            if (!nombre) return 'fotos/default.jpg';
            const slug = nombre.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
            return `fotos/${slug}.jpg`;
        }

        async function iniciar() {
            try {
                const [s, a, b, c, p] = await Promise.all(Object.values(URLS).map(u => fetch(u).then(r => r.text())));
                db.standing = Papa.parse(s, { header: true, skipEmptyLines: true }).data;
                db.pitchers = Papa.parse(p, { header: true, skipEmptyLines: true }).data;
                const jA = Papa.parse(a, { header: true, skipEmptyLines: true }).data.map(j => ({...j, equipo: 'A'}));
                const jB = Papa.parse(b, { header: true, skipEmptyLines: true }).data.map(j => ({...j, equipo: 'B'}));
                const jC = Papa.parse(c, { header: true, skipEmptyLines: true }).data.map(j => ({...j, equipo: 'C'}));
                db.jugadores = [...jA, ...jB, ...jC];
                actualizar();
            } catch (e) { console.error(e); }
        }

        function cambiarVista(v) {
            vista = v;
            document.getElementById('btn-bateo').className = v === 'bateo' ? 'flex-1 py-3 rounded-lg text-sm tab-active uppercase' : 'flex-1 py-3 rounded-lg text-sm text-slate-400 font-bold uppercase';
            document.getElementById('btn-pitcheo').className = v === 'pitcheo' ? 'flex-1 py-3 rounded-lg text-sm tab-active uppercase' : 'flex-1 py-3 rounded-lg text-sm text-slate-400 font-bold uppercase';
            actualizar();
        }

        function actualizar() {
            const eq = document.getElementById('filtroEq').value;
            const busq = document.getElementById('buscador').value.toLowerCase();
            
            document.getElementById('tabla-standing').innerHTML = db.standing.map(s => `
                <tr class="hover:bg-slate-50 border-b">
                    <td class="p-4 text-left font-black text-blue-900 italic uppercase">${s.Equipo || ""}</td>
                    <td>${f(s.Games)}</td><td>${f(s.Win)}</td><td>${f(s.Loss)}</td><td>${f(s.Tie)}</td>
                    <td class="text-blue-600 font-black text-lg">${f(s.Pts)}</td><td>${f(s['Avg.'], true)}</td>
                </tr>`).join('');

            if(vista === 'bateo') {
                let list = db.jugadores.filter(j => (eq === 'TODOS' || j.equipo === eq) && (j.Player || "").toLowerCase().includes(busq));
                renderBateo(list);
                renderLideres(true);
            } else {
                let list = db.pitchers.filter(p => (eq === 'TODOS' || p.Equipo === eq) && (p.Pitcher || "").toLowerCase().includes(busq));
                renderPitcheo(list);
                renderLideres(false);
            }
        }

        function renderLideres(esBateo) {
            // CATEGORÍAS SOLICITADAS
            const cats = esBateo 
                ? [
                    {n:'BATTING AVG', k:'AVG', d:true}, 
                    {n:'HOME RUNS', k:'HR'}, 
                    {n:'TRIPLES (H3)', k:'3B'}, 
                    {n:'DOUBLES (H2)', k:'2B'}, 
                    {n:'HITS TOTALES', k:'HITS'}, 
                    {n:'RUNS SCORED', k:'Runs'}, 
                    {n:'RBI', k:'RBI'}, 
                    {n:'STOLEN BASES', k:'SB'}, 
                    {n:'BASE ON BALLS', k:'BB'}
                  ]
                : [
                    {n:'EFECTIVIDAD', k:'ERA', e:true, rev:true}, 
                    {n:'VICTORIAS', k:'G'}, 
                    {n:'PONCHES', k:'K'}
                  ];
            
            const limit = 10;

            document.getElementById('lideratos').innerHTML = cats.map(cat => {
                const tops = [...(esBateo ? db.jugadores : db.pitchers)]
                    .filter(j => j[cat.k] && j[cat.k] !== "")
                    .sort((a,b) => {
                        let vA = f(a[cat.k], cat.d, cat.e);
                        let vB = f(b[cat.k], cat.d, cat.e);
                        return cat.rev ? vA - vB : vB - vA;
                    }).slice(0, limit);

                if (tops.length === 0) return '';
                const primero = tops[0];

                return `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden card-leader border border-slate-100 h-full">
                    <div class="bg-slate-900 p-3 text-center">
                        <h4 class="text-[10px] font-black text-yellow-400 uppercase tracking-widest">${cat.n} - TOP 10</h4>
                    </div>
                    
                    <div class="relative h-48 bg-slate-200 overflow-hidden">
                        <img src="${getFotoURL(primero.Player || primero.Pitcher)}" 
                             onerror="this.src='https://ui-avatars.com/api/?name=${(primero.Player || primero.Pitcher).replace(' ','+')}&background=1e3a8a&color=fff'"
                             class="w-full h-full object-cover">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-4">
                            <p class="text-white font-black italic uppercase text-lg leading-none">${primero.Player || primero.Pitcher}</p>
                            <p class="text-yellow-400 font-bold text-xs">LÍDER DE CATEGORÍA</p>
                        </div>
                        <div class="absolute top-4 right-4 bg-yellow-400 text-slate-900 h-10 w-10 rounded-full flex items-center justify-center font-black text-xl shadow-lg border-2 border-white italic">
                            ${f(primero[cat.k], cat.d, cat.e)}
                        </div>
                    </div>

                    <div class="p-4 flex-1 space-y-2">
                        ${tops.slice(1).map((j,i) => `
                            <div class="flex justify-between items-center py-1 border-b border-slate-50 last:border-0 text-[11px]">
                                <span class="font-bold text-slate-600 truncate italic">${i+2}. ${j.Player || j.Pitcher}</span>
                                <span class="font-black text-blue-900">${f(j[cat.k], cat.d, cat.e)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function renderBateo(l) {
            document.getElementById('head-tabla').innerHTML = `<tr><th class="p-4">Jugador</th><th>Eq</th><th>TO</th><th>VB</th><th class="bg-blue-600 text-white">AVG</th><!--<th>SLG</th>--><th>H</th><th>1B</th><th>2B</th><th>3B</th><th class="text-red-600">HR</th><th>RBI</th><th>R</th><th>BB</th><th>SO</th><th>SB</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(j => `
                <tr class="hover:bg-blue-50 border-b border-slate-50">
                    <td class="p-4 font-black text-slate-900 uppercase italic leading-tight">${j.Player}</td>
                    <td class="text-center font-bold text-slate-400 text-[10px]">${j.equipo}</td>
                    <td>${f(j.TO)}</td><td>${f(j.VB)}</td>
                    <td class="font-black text-blue-700 bg-blue-50 text-xs">${f(j.AVG, true)}</td>
                    <!--<td class="font-bold text-slate-400">${f(j.SLG, true)}</td>-->
                    <td class="font-black">${f(j.HITS)}</td><td>${f(j['1B'])}</td><td>${f(j['2B'])}</td><td>${f(j['3B'])}</td>
                    <td class="text-red-600 font-black">${f(j.HR)}</td><td class="font-black text-slate-800">${f(j.RBI)}</td>
                    <td>${f(j.Runs)}</td><td>${f(j.BB)}</td><td class="text-slate-300">${f(j.SO)}</td><td class="text-green-600 font-bold">${f(j.SB)}</td>
                </tr>`).join('');
        }

        function renderPitcheo(l) {
            document.getElementById('head-tabla').innerHTML = `<tr><th class="p-4">Lanzador</th><th>Eq</th><th class="bg-blue-600 text-white">ERA</th><th>G</th><th>IP</th><th class="bg-red-600 text-white">K</th><th>WHIP</th><th>BB</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(p => `
                <tr class="hover:bg-red-50 border-b border-slate-50">
                    <td class="p-4 font-black text-slate-900 uppercase italic">${p.Pitcher}</td>
                    <td class="text-center font-bold text-slate-400 text-[10px]">${p.Equipo}</td>
                    <td class="font-black text-blue-700 bg-blue-50 text-xs">${f(p.ERA, false, true)}</td>
                    <td>${f(p.G)}</td><td>${f(p.IP)}</td>
                    <td class="font-black text-red-600 bg-red-50 text-center">${f(p.K)}</td>
                    <td>${f(p.WHIP)}</td><td>${f(p.BB)}</td>
                </tr>`).join('');
        }

        iniciar();
    </script>
</body>
</html>
