<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Liga San Jerónimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-league { background: linear-gradient(135deg, #1e3a8a 0%, #111827 100%); }
        .accent { color: #fbbf24; }
        .tab-active { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
        .table-container { overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <header class="bg-league text-white py-8 shadow-xl text-center">
        <h1 class="text-3xl font-black uppercase tracking-wider italic">Liga San Jerónimo</h1>
        <p class="accent font-bold mt-1 uppercase text-sm italic">Estadísticas 2026 (Números Enteros)</p>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-10 bg-white rounded-xl shadow-md border overflow-hidden">
            <div class="table-container">
                <table class="w-full text-center text-sm">
                    <thead class="bg-gray-100 text-gray-600 uppercase text-[11px]">
                        <tr><th>Eq</th><th>JJ</th><th>JG</th><th>JP</th><th>JE</th><th>PTS</th><th class="italic">AVG</th></tr>
                    </thead>
                    <tbody id="tabla-standing" class="divide-y font-bold"></tbody>
                </table>
            </div>
        </div>

        <div class="flex border-b mb-6 bg-white shadow-sm">
            <button onclick="cambiarVista('bateo')" id="btn-bateo" class="flex-1 py-4 font-black tab-active">BATEADORES</button>
            <button onclick="cambiarVista('pitcheo')" id="btn-pitcheo" class="flex-1 py-4 font-black text-gray-400">LANZADORES</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12" id="lideratos"></div>

        <div class="bg-white rounded-xl shadow-2xl border overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <input type="text" id="buscador" onkeyup="actualizar()" placeholder="Buscar jugador..." class="p-2 border rounded text-sm w-64">
                <select id="filtroEq" onchange="actualizar()" class="p-2 border rounded font-bold text-sm bg-white">
                    <option value="TODOS">Todos los Equipos</option>
                    <option value="A">Equipo A</option><option value="B">Equipo B</option><option value="C">Equipo C</option>
                </select>
            </div>
            <div class="table-container">
                <table class="w-full text-left text-xs border-collapse">
                    <thead id="head-tabla" class="bg-slate-800 text-white uppercase font-bold"></thead>
                    <tbody id="body-tabla" class="divide-y text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let db = {};
        let vista = 'bateo';

        async function iniciar() {
            const r = await fetch('datos_liga.json');
            db = await r.json();
            actualizar();
        }

        function cambiarVista(v) {
            vista = v;
            document.getElementById('btn-bateo').className = v === 'bateo' ? 'flex-1 py-4 font-black tab-active' : 'flex-1 py-4 font-black text-gray-400';
            document.getElementById('btn-pitcheo').className = v === 'pitcheo' ? 'flex-1 py-4 font-black tab-active' : 'flex-1 py-4 font-black text-gray-400';
            actualizar();
        }

        function actualizar() {
            const eq = document.getElementById('filtroEq').value;
            const busq = document.getElementById('buscador').value.toLowerCase();
            
            document.getElementById('tabla-standing').innerHTML = db.standing.map(s => `
                <tr class="border-b">
                    <td class="p-3 text-blue-800 font-black">${s.equipo}</td>
                    <td>${s.jj}</td><td>${s.jg}</td><td>${s.jp}</td><td>${s.je}</td>
                    <td class="font-black">${s.pts}</td><td class="italic">${s.avg}</td>
                </tr>`).join('');

            if(vista === 'bateo') {
                let f = db.jugadores.filter(j => (eq === 'TODOS' || j.equipo === eq) && j.nombre.toLowerCase().includes(busq));
                renderBateo(f);
                renderLideresBateo();
            } else {
                let f = db.pitchers.filter(p => (eq === 'TODOS' || p.equipo === eq) && p.nombre.toLowerCase().includes(busq));
                renderPitcheo(f);
                renderLideresPitcheo();
            }
        }

        function renderLideresBateo() {
            const cats = [
                {n:'Batting Average', k:'avg'}, {n:'Home Runs', k:'hr'}, {n:'Total Hits', k:'hits'},
                {n:'Triples', k:'b3'}, {n:'Dobles', k:'b2'}, {n:'Anotadas', k:'runs'},
                {n:'RBI', k:'rbi'}, {n:'Bases Robadas', k:'sb'}, {n:'Bases por Bolas', k:'bb'}
            ];
            generarCards(cats, db.jugadores);
        }

        function renderLideresPitcheo() {
            const cats = [{n:'ERA', k:'era', rev:true}, {n:'Wins', k:'g'}, {n:'Strikeouts', k:'k'}];
            generarCards(cats, db.pitchers);
        }

        function generarCards(cats, pool) {
            document.getElementById('lideratos').innerHTML = cats.map(cat => {
                const tops = [...pool].sort((a,b) => cat.rev ? a[cat.k] - b[cat.k] : b[cat.k] - a[cat.k]).slice(0, 10);
                return `
                <div class="bg-white p-4 rounded-xl shadow border-t-4 border-blue-900">
                    <h4 class="text-[10px] font-black text-blue-900 uppercase mb-2">${cat.n}</h4>
                    ${tops.map((j,i) => `
                        <div class="flex justify-between py-1 border-b text-[11px]">
                            <span>${i+1}. ${j.nombre}</span><span class="font-black text-blue-600">${j[cat.k]}</span>
                        </div>`).join('')}
                </div>`;
            }).join('');
        }

        function renderBateo(l) {
            document.getElementById('head-tabla').innerHTML = `
                <tr><th class="p-3">Jugador</th><th>Eq</th><th>VB</th><th class="bg-blue-700">AVG</th><th class="bg-blue-700">HR</th><th>H</th><th>2B</th><th>3B</th><th>SB</th><th>BB</th><th>Runs</th><th>RBI</th><th>wOBA</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(j => `
                <tr class="hover:bg-blue-50 border-b font-medium">
                    <td class="p-3 font-bold">${j.nombre}</td><td class="text-center">${j.equipo}</td><td>${j.vb}</td>
                    <td class="font-black text-blue-700">${j.avg}</td><td class="font-black text-red-700">${j.hr}</td>
                    <td>${j.hits}</td><td>${j.b2}</td><td>${j.b3}</td><td>${j.sb}</td><td>${j.bb}</td><td>${j.runs}</td><td>${j.rbi}</td><td>${j.woba}</td>
                </tr>`).join('');
        }

        function renderPitcheo(l) {
            document.getElementById('head-tabla').innerHTML = `
                <tr><th class="p-3">Lanzador</th><th>Eq</th><th class="bg-blue-700">ERA</th><th>G</th><th>IP</th><th>K</th><th>WHIP</th><th>BB</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(p => `
                <tr class="hover:bg-red-50 border-b font-medium">
                    <td class="p-3 font-bold">${p.nombre}</td><td class="text-center">${p.equipo}</td>
                    <td class="font-black text-blue-700">${p.era}</td><td>${p.g}</td><td>${p.ip}</td><td class="font-black text-red-700">${p.k}</td><td>${p.whip}</td><td>${p.bb}</td>
                </tr>`).join('');
        }

        iniciar();
    </script>
</body>
</html>
