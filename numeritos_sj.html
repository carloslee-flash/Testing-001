<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Liga San Jerónimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-league { background: linear-gradient(135deg, #1e3a8a 0%, #111827 100%); }
        .accent { color: #fbbf24; }
        .tab-active { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-league text-white py-8 shadow-xl">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl font-black uppercase tracking-wider">Liga San Jerónimo</h1>
            <p class="accent font-bold mt-1 uppercase text-sm italic">Estadísticas Oficiales 2026 - Serie Regular</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <div class="mb-10 bg-white rounded-xl shadow-md border overflow-hidden">
            <div class="bg-slate-800 text-white p-3 font-bold text-center uppercase tracking-widest text-[10px]">Posiciones (League Standing)</div>
            <div class="overflow-x-auto">
                <table class="w-full text-center text-sm">
                    <thead class="bg-gray-100 text-gray-600 uppercase text-[11px]">
                        <tr><th class="p-3">Eq</th><th class="p-3">JJ</th><th class="p-3 text-green-700">JG</th><th class="p-3 text-red-700">JP</th><th class="p-3">JE</th><th class="p-3">PTS</th><th class="p-3 italic">AVG</th></tr>
                    </thead>
                    <tbody id="tabla-standing" class="divide-y font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="flex border-b mb-6 bg-white rounded-t-lg">
            <button onclick="cambiarVista('bateo')" id="btn-bateo" class="flex-1 py-4 font-black tab-active transition-all">BATEADORES</button>
            <button onclick="cambiarVista('pitcheo')" id="btn-pitcheo" class="flex-1 py-4 font-black text-gray-400 transition-all">LANZADORES</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="lideratos"></div>

        <div class="bg-white rounded-xl shadow-2xl border overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <h3 class="font-black text-blue-900 uppercase whitespace-nowrap" id="titulo-tabla">Registros</h3>
                    <input type="text" id="buscador" onkeyup="actualizar()" placeholder="Buscar jugador..." class="p-2 border rounded text-sm w-full md:w-48">
                </div>
                <select id="filtroEq" onchange="actualizar()" class="p-2 border rounded font-bold text-sm bg-white shadow-sm">
                    <option value="TODOS">Todos los Equipos</option>
                    <option value="A">Equipo A</option>
                    <option value="B">Equipo B</option>
                    <option value="C">Equipo C</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs md:text-sm">
                    <thead id="head-tabla" class="bg-slate-100 text-slate-500 uppercase font-bold border-b"></thead>
                    <tbody id="body-tabla" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let db = {};
        let vista = 'bateo';

        async function iniciar() {
            try {
                const r = await fetch('datos_liga.json');
                db = await r.json();
                actualizar();
            } catch (e) {
                console.error("Error cargando JSON:", e);
                alert("No se pudo cargar el archivo datos_liga.json. Asegúrate de que esté en la misma carpeta.");
            }
        }

        function cambiarVista(v) {
            vista = v;
            document.getElementById('btn-bateo').className = v === 'bateo' ? 'flex-1 py-4 font-black tab-active' : 'flex-1 py-4 font-black text-gray-400';
            document.getElementById('btn-pitcheo').className = v === 'pitcheo' ? 'flex-1 py-4 font-black tab-active' : 'flex-1 py-4 font-black text-gray-400';
            actualizar();
        }

        function actualizar() {
            const eq = document.getElementById('filtroEq').value;
            const busq = document.getElementById('buscador').value.toLowerCase();
            
            // Standings
            document.getElementById('tabla-standing').innerHTML = db.standing.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-3 text-blue-800">${s.equipo}</td><td>${s.jj}</td><td class="text-green-700 font-black">${s.jg}</td><td class="text-red-700">${s.jp}</td><td>${s.je}</td><td class="text-base">${s.pts}</td><td class="italic">${s.avg.toFixed(3)}</td>
                </tr>`).join('');

            if(vista === 'bateo') {
                let f = db.jugadores.filter(j => (eq === 'TODOS' || j.equipo === eq) && j.nombre.toLowerCase().includes(busq));
                renderBateo(f);
                renderLideres('bateo');
            } else {
                let f = db.pitchers.filter(p => (eq === 'TODOS' || p.equipo === eq) && p.nombre.toLowerCase().includes(busq));
                renderPitcheo(f);
                renderLideres('pitcheo');
            }
        }

        function renderLideres(t) {
            const c = t === 'bateo' ? 
                [{n:'Batting Average', k:'avg', d:3}, {n:'Home Runs', k:'hr', d:0}, {n:'RBI', k:'rbi', d:0}] :
                [{n:'ERA', k:'era', d:2, rev:true}, {n:'Wins', k:'g', d:0}, {n:'Strikeouts', k:'k', d:0}];
            const pool = t === 'bateo' ? db.jugadores : db.pitchers;

            document.getElementById('lideratos').innerHTML = c.map(cat => {
                const tops = [...pool].sort((a,b) => cat.rev ? a[cat.k] - b[cat.k] : b[cat.k] - a[cat.k]).slice(0, 10);
                return `
                <div class="bg-white p-4 rounded-xl shadow border-t-4 border-blue-800">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">${cat.n} (TOP 10)</h4>
                    ${tops.map((j,i) => `
                        <div class="flex justify-between items-center py-1.5 border-b border-gray-50 text-[11px]">
                            <span class="${i===0?'font-black text-blue-900':''}">${i+1}. ${j.nombre}</span>
                            <span class="font-black text-blue-700">${cat.d ? j[cat.k].toFixed(cat.d) : j[cat.k]}</span>
                        </div>`).join('')}
                </div>`;
            }).join('');
        }

        function renderBateo(l) {
            document.getElementById('head-tabla').innerHTML = `<tr><th class="p-4">Jugador</th><th>Eq</th><th class="text-blue-800">AVG</th><th>HR</th><th>RBI</th><th class="text-orange-600">wOBA</th><th>SLG</th><th>wRAA</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(j => `
                <tr class="hover:bg-blue-50 font-semibold text-slate-600">
                    <td class="p-4 text-slate-900">${j.nombre}</td><td>${j.equipo}</td><td class="font-black text-blue-600">${j.avg.toFixed(3)}</td><td class="font-black text-slate-800">${j.hr}</td><td>${j.rbi}</td><td class="text-orange-600 font-black">${j.woba.toFixed(3)}</td><td>${j.slg.toFixed(3)}</td><td>${j.wraa.toFixed(1)}</td>
                </tr>`).join('');
        }

        function renderPitcheo(l) {
            document.getElementById('head-tabla').innerHTML = `<tr><th class="p-4">Lanzador</th><th>Eq</th><th class="text-blue-800">ERA</th><th>G-P</th><th>IP</th><th class="text-red-700">K</th><th>WHIP</th><th>BB</th></tr>`;
            document.getElementById('body-tabla').innerHTML = l.map(p => `
                <tr class="hover:bg-red-50 font-semibold text-slate-600">
                    <td class="p-4 text-slate-900 font-bold">${p.nombre}</td><td>${p.equipo}</td><td class="font-black text-blue-600">${p.era.toFixed(2)}</td><td class="font-black text-slate-800">${p.g}-${p.p||0}</td><td>${p.ip.toFixed(1)}</td><td class="text-red-600 font-black">${p.k}</td><td>${p.whip.toFixed(2)}</td><td>${p.bb}</td>
                </tr>`).join('');
        }

        iniciar();
    </script>
</body>
</html>
